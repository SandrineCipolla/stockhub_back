# ⚠️ IMPORTANT: Ce fichier doit être mis à jour à chaque modification des endpoints API
# Penser à mettre à jour les schémas, exemples et descriptions lors de changements dans:
# - Routes (ajout/suppression d'endpoints)
# - DTOs (modification des structures de données)
# - Business rules (changement de logique métier affectant les réponses)

openapi: 3.0.0

info:
  title: StockHub Backend API
  version: 2.8.1
  description: |
    API REST pour la gestion de stocks (alimentation, hygiène, artistique)

    **Architecture:** DDD/CQRS avec séparation Read/Write
    - **Read Side (Visualization):** Consultation des stocks
    - **Write Side (Manipulation):** Création et modification des stocks

    **Authentification:** Azure AD B2C avec tokens JWT Bearer

  contact:
    name: Sandrine Cipolla
    email: sandrine.cipolla@gmail.com
  license:
    name: Private - RNCP Project

servers:
  - url: http://localhost:3006
    description: Serveur de développement local
  - url: https://stockhub-back.azurewebsites.net
    description: Serveur de production Azure

tags:
  - name: Stock Visualization (READ)
    description: Endpoints de consultation des stocks (CQRS Read Side)
  - name: Stock Manipulation (WRITE)
    description: Endpoints de création et modification des stocks (CQRS Write Side)
  - name: Stock Contributions (WRITE)
    description: Workflow de contributions — VIEWER_CONTRIBUTOR soumet, OWNER approuve/rejette

security:
  - BearerAuth: []

paths:
  /api/v2/stocks:
    get:
      summary: Récupérer tous les stocks
      description: Retourne la liste complète des stocks appartenant à l'utilisateur authentifié
      tags:
        - Stock Visualization (READ)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste des stocks récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockDTO'
              examples:
                success:
                  summary: Exemple de réponse réussie
                  value:
                    - id: 1
                      name: Stock Aquarelle
                      description: Stock de peinture aquarelle pour loisirs créatifs
                      category: artistique
                      quantity: 15
                      unit: unités
                      minimumStock: 5
                      status: optimal
                    - id: 2
                      name: Stock Alimentaire
                      description: Stock de conserves et denrées non périssables
                      category: alimentation
                      quantity: 8
                      unit: unités
                      minimumStock: 10
                      status: low
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Créer un nouveau stock
      description: Crée un nouveau stock vide pour l'utilisateur authentifié
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockBody'
            examples:
              aquarelle:
                summary: Création d'un stock artistique
                value:
                  label: Stock Aquarelle
                  description: Stock de peinture aquarelle pour loisirs créatifs
                  category: artistique
              alimentaire:
                summary: Création d'un stock alimentaire
                value:
                  label: Stock Alimentaire
                  description: Stock de conserves et denrées non périssables
                  category: alimentation
      responses:
        '201':
          description: Stock créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockDTO'
              example:
                id: 1
                name: Stock Aquarelle
                description: Stock de peinture aquarelle pour loisirs créatifs
                category: artistique
                quantity: 0
                unit: unités
                minimumStock: 0
                status: out-of-stock
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}:
    get:
      summary: Récupérer les détails d'un stock
      description: Retourne les informations détaillées d'un stock spécifique
      tags:
        - Stock Visualization (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Détails du stock récupérés avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockDTO'
              example:
                id: 1
                name: Stock Aquarelle
                description: Stock de peinture aquarelle pour loisirs créatifs
                category: artistique
                quantity: 15
                unit: unités
                minimumStock: 5
                status: optimal
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Modifier un stock
      description: Met à jour le label, la description ou la catégorie d'un stock existant
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStockBody'
            example:
              label: Stock Aquarelle Mise à jour
              description: Stock de peinture aquarelle pour loisirs créatifs
              category: artistique
      responses:
        '200':
          description: Stock modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Supprimer un stock
      description: Supprime un stock et tous ses items (cascade delete)
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Stock supprimé avec succès (pas de contenu retourné)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/items:
    get:
      summary: Récupérer les items d'un stock
      description: Retourne la liste des items appartenant à un stock spécifique
      tags:
        - Stock Visualization (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Liste des items récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockItemDTO'
              examples:
                success:
                  summary: Exemple avec plusieurs items
                  value:
                    - id: 1
                      label: Aquarelle Rouge Vermillon
                      description: Tube 12ml
                      quantity: 3
                      minimumStock: 1
                      stockId: 1
                    - id: 2
                      label: Aquarelle Bleu Outremer
                      description: Tube 12ml
                      quantity: 5
                      minimumStock: 2
                      stockId: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Ajouter un item au stock
      description: Ajoute un nouvel item (produit) à un stock existant
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemToStockBody'
            example:
              label: Aquarelle Rouge Vermillon
              description: Tube 12ml
              quantity: 3
              minimumStock: 1
      responses:
        '201':
          description: Item ajouté avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockItemDTO'
              example:
                id: 1
                label: Aquarelle Rouge Vermillon
                description: Tube 12ml
                quantity: 3
                minimumStock: 1
                stockId: 1
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/items/{itemId}:
    patch:
      summary: Modifier un item
      description: Met à jour un ou plusieurs champs d'un item (label, description, minimumStock, quantity). Tous les champs sont optionnels — seuls les champs fournis sont modifiés.
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
        - name: itemId
          in: path
          required: true
          description: Identifiant unique de l'item
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemBody'
            examples:
              quantityOnly:
                summary: Mise à jour de la quantité uniquement
                value:
                  quantity: 5
              labelAndDescription:
                summary: Mise à jour du label, description et stock minimum
                value:
                  label: Tomates bio
                  description: Tomates bio du marché
                  minimumStock: 5
              allFields:
                summary: Mise à jour de tous les champs
                value:
                  label: Tomates bio
                  description: Tomates bio du marché
                  minimumStock: 5
                  quantity: 20
      responses:
        '200':
          description: Item modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockItemDTO'
              example:
                id: 1
                label: Tomates bio
                description: Tomates bio du marché
                quantity: 20
                minimumStock: 5
                stockId: 1
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Supprimer un item d'un stock
      description: Supprime un item spécifique d'un stock.
      tags:
        - Stock Manipulation (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
        - name: itemId
          in: path
          required: true
          description: Identifiant unique de l'item
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Item supprimé avec succès (pas de contenu retourné)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/suggestions:
    get:
      summary: Suggestions IA pour un stock
      description: |
        Retourne des suggestions textuelles générées par un LLM (Mistral via OpenRouter) ou de manière
        déterministe si la clé API est absente. Les suggestions sont basées sur les prédictions de stock
        existantes (daysUntilEmpty, trend, avgDailyConsumption).

        Aucune donnée personnelle (nom, email, OID) n'est transmise au LLM.

        Si `OPENROUTER_API_KEY` est absent ou si l'appel échoue, un fallback déterministe est retourné
        avec `source: "deterministic"`.
      tags:
        - Stock Prediction (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Liste de suggestions IA pour ce stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AISuggestion'
              example:
                - itemId: 1
                  type: RESTOCK
                  priority: high
                  title: Stock critique — réassort urgent
                  description: "Le stock de l'item 1 sera épuisé dans moins de 7 jours. Réassort recommandé : 55 unités."
                  source: deterministic
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/items/{itemId}/history:
    get:
      summary: Historique de consommation d'un item
      description: Retourne l'historique des changements de quantité (CONSUMPTION, RESTOCK, ADJUSTMENT) pour un item sur une période donnée.
      tags:
        - Stock Prediction (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
        - name: itemId
          in: path
          required: true
          description: Identifiant unique de l'item
          schema:
            type: integer
            example: 1
        - name: days
          in: query
          required: false
          description: Nombre de jours d'historique à retourner (défaut 90)
          schema:
            type: integer
            example: 90
      responses:
        '200':
          description: Historique de consommation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemHistoryRecord'
              example:
                - id: 1
                  itemId: 1
                  oldQuantity: 10
                  newQuantity: 8
                  changeType: CONSUMPTION
                  changedBy: null
                  changedAt: '2026-03-24T08:00:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/items/{itemId}/prediction:
    get:
      summary: Prédiction de stock pour un item
      description: |
        Retourne la dernière prédiction calculée pour un item (cache). Si aucune prédiction n'existe, en calcule une à la volée.

        Les prédictions sont recalculées automatiquement chaque matin (cron job).
        Si l'historique est insuffisant (< 7 jours de consommation), `simulatedFallback=true` est retourné.
      tags:
        - Stock Prediction (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
        - name: itemId
          in: path
          required: true
          description: Identifiant unique de l'item
          schema:
            type: integer
            example: 1
        - name: quantity
          in: query
          required: false
          description: Quantité actuelle de l'item (utilisée pour le calcul si recalcul nécessaire)
          schema:
            type: integer
            example: 15
        - name: minimumStock
          in: query
          required: false
          description: Stock minimum (utilisé pour le calcul du réassort recommandé)
          schema:
            type: integer
            example: 2
      responses:
        '200':
          description: Prédiction de stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResult'
              example:
                itemId: 1
                daysUntilEmpty: 15
                avgDailyConsumption: 1.0
                trend: STABLE
                recommendedRestock: 32
                simulatedFallback: false
                generatedAt: '2026-03-25T08:00:00.000Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/items/{itemId}/contributions:
    post:
      summary: Soumettre une contribution (modification de quantité)
      description: |
        Permet à un VIEWER_CONTRIBUTOR de proposer une mise à jour de quantité sur un item.
        La contribution est créée avec le statut PENDING et attend l'approbation du propriétaire.
      tags:
        - Stock Contributions (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContributionBody'
            example:
              suggestedQuantity: 0
      responses:
        '201':
          description: Contribution créée avec statut PENDING
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemContributionDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v2/stocks/{stockId}/contributions:
    get:
      summary: Lister les contributions en attente sur un stock
      description: Retourne les contributions PENDING sur un stock. Accessible par tous les collaborateurs (READ).
      tags:
        - Stock Contributions (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Liste des contributions en attente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaboratorDTO'
              example:
                - id: 1
                  stockId: 1
                  userId: 2
                  userEmail: editor@example.com
                  role: EDITOR
                  grantedAt: '2026-04-01T10:00:00.000Z'
                  grantedBy: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Ajouter un collaborateur à un stock
      description: |
        Ajoute un utilisateur comme collaborateur avec un rôle donné.

        **Règle hiérarchique :**
        - OWNER peut ajouter : EDITOR, VIEWER, VIEWER_CONTRIBUTOR
        - EDITOR peut ajouter : VIEWER, VIEWER_CONTRIBUTOR uniquement

        Requiert le rôle OWNER ou EDITOR.
      tags:
        - Stock Collaborators (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollaboratorBody'
            example:
              email: viewer@example.com
              role: VIEWER
      responses:
        '201':
          description: Collaborateur ajouté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/collaborators:
    get:
      summary: Lister les collaborateurs d'un stock
      description: |
        Retourne la liste de tous les collaborateurs d'un stock avec leur rôle.
        Accessible à tous les rôles (OWNER, EDITOR, VIEWER, VIEWER_CONTRIBUTOR).
      tags:
        - Stock Collaborators (READ)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Liste des collaborateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollaboratorDTO'
              example:
                - id: 1
                  stockId: 1
                  userId: 2
                  userEmail: editor@example.com
                  role: EDITOR
                  grantedAt: '2026-04-01T10:00:00.000Z'
                  grantedBy: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Ajouter un collaborateur à un stock
      description: |
        Ajoute un utilisateur comme collaborateur avec un rôle donné.

        **Règle hiérarchique :**
        - OWNER peut ajouter : EDITOR, VIEWER, VIEWER_CONTRIBUTOR
        - EDITOR peut ajouter : VIEWER, VIEWER_CONTRIBUTOR uniquement

        Requiert le rôle OWNER ou EDITOR.
      tags:
        - Stock Collaborators (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          description: Identifiant unique du stock
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollaboratorBody'
            example:
              email: viewer@example.com
              role: VIEWER
      responses:
        '201':
          description: Collaborateur ajouté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/stocks/{stockId}/collaborators/{collaboratorId}:
    patch:
      summary: Modifier le rôle d'un collaborateur
      description: |
        Met à jour le rôle d'un collaborateur existant.

        **Règle hiérarchique :** impossible de modifier un collaborateur de rang supérieur ou égal.
        Requiert le rôle OWNER ou EDITOR.
      tags:
        - Stock Collaborators (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: collaboratorId
          in: path
          required: true
          description: ID de la relation StockCollaborator
          schema:
            type: integer
            example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollaboratorRoleBody'
            example:
              role: VIEWER_CONTRIBUTOR
      responses:
        '200':
          description: Rôle mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Supprimer un collaborateur d'un stock
      description: |
        Retire un utilisateur des collaborateurs du stock.

        **Règle hiérarchique :** impossible de supprimer un collaborateur de rang supérieur ou égal.
        Requiert le rôle OWNER ou EDITOR.
      tags:
        - Stock Collaborators (WRITE)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: collaboratorId
          in: path
          required: true
          schema:
            type: integer
            example: 5
      responses:
        '204':
          description: Collaborateur supprimé
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/contributions/pending-count:
    get:
      summary: Nombre de contributions en attente pour l'utilisateur connecté
      description: |
        Retourne le nombre total de contributions PENDING concernant l'utilisateur :
        - Contributions en attente sur les stocks dont il est OWNER
        - Contributions qu'il a lui-même soumises et qui sont encore PENDING

        Utilisé pour afficher le compteur de notifications sur la cloche.
      tags:
        - Stock Contributions (WRITE)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Nombre de contributions en attente
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                properties:
                  count:
                    type: integer
                    description: Nombre de contributions PENDING concernant l'utilisateur
                    example: 3
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT Azure AD B2C obtenu via authentification OAuth2

        **Format:** `Bearer {token}`

        **Obtention du token:**
        1. Authentification via Azure AD B2C (flow ROPC ou Implicit)
        2. Récupération du token JWT
        3. Inclusion dans le header: `Authorization: Bearer {token}`

  schemas:
    # Collaborateurs
    CollaboratorDTO:
      type: object
      required:
        - id
        - stockId
        - userId
        - userEmail
        - role
        - grantedAt
      properties:
        id:
          type: integer
          example: 1
        stockId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 2
        userEmail:
          type: string
          format: email
          example: viewer@example.com
        role:
          type: string
          enum: [EDITOR, VIEWER, VIEWER_CONTRIBUTOR]
          example: VIEWER
        grantedAt:
          type: string
          format: date-time
          example: '2026-04-01T10:00:00.000Z'
        grantedBy:
          type: integer
          nullable: true
          example: 1

    AddCollaboratorBody:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
          example: viewer@example.com
        role:
          type: string
          enum: [EDITOR, VIEWER, VIEWER_CONTRIBUTOR]
          example: VIEWER

    UpdateCollaboratorRoleBody:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [EDITOR, VIEWER, VIEWER_CONTRIBUTOR]
          example: VIEWER_CONTRIBUTOR

    # Suggestions IA
    AISuggestion:
      type: object
      required:
        - itemId
        - type
        - priority
        - title
        - description
        - source
      properties:
        itemId:
          type: integer
          description: Identifiant de l'item concerné
          example: 1
        type:
          type: string
          enum: [RESTOCK, OVERSTOCK, TREND_ALERT, EXPIRY_ALERT, OPTIMIZATION]
          description: Type de suggestion
          example: RESTOCK
        priority:
          type: string
          enum: [high, medium, low]
          description: Niveau de priorité
          example: high
        title:
          type: string
          description: Titre court de la suggestion (max 80 caractères)
          example: Stock critique — réassort urgent
        description:
          type: string
          description: Description actionnable de la suggestion (max 200 caractères)
          example: "Le stock de l'item 1 sera épuisé dans moins de 7 jours. Réassort recommandé : 55 unités."
        source:
          type: string
          enum: [llm, deterministic]
          description: Source de la suggestion — "llm" si générée par le modèle IA, "deterministic" si générée par règles métier
          example: llm

    # Prédiction IA
    ItemHistoryRecord:
      type: object
      properties:
        id:
          type: integer
        itemId:
          type: integer
        oldQuantity:
          type: integer
        newQuantity:
          type: integer
        changeType:
          type: string
          enum: [CONSUMPTION, RESTOCK, ADJUSTMENT]
        changedBy:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time

    PredictionResult:
      type: object
      properties:
        itemId:
          type: integer
        daysUntilEmpty:
          type: integer
          nullable: true
        avgDailyConsumption:
          type: number
          nullable: true
        trend:
          type: string
          enum: [STABLE, INCREASING, DECREASING]
        recommendedRestock:
          type: integer
          nullable: true
        simulatedFallback:
          type: boolean
        generatedAt:
          type: string
          format: date-time

    # DTOs de réponse (Response)
    StockDTO:
      type: object
      required:
        - id
        - label
        - description
        - category
        - totalItems
        - totalQuantity
        - criticalItemsCount
        - status
      properties:
        id:
          type: integer
          description: Identifiant unique du stock
          example: 1
        label:
          type: string
          description: Nom du stock
          example: Stock Aquarelle
        description:
          type: string
          description: Description du stock
          example: Stock de peinture aquarelle pour loisirs créatifs
        category:
          type: string
          description: Catégorie du stock
          enum:
            - alimentation
            - hygiene
            - artistique
          example: artistique
        totalItems:
          type: integer
          description: Nombre total d'items dans le stock
          example: 3
        totalQuantity:
          type: integer
          description: Somme des quantités de tous les items
          example: 24
        criticalItemsCount:
          type: integer
          description: Nombre d'items en statut critique ou en rupture
          example: 1
        status:
          type: string
          enum:
            - optimal
            - low
            - critical
            - out-of-stock
            - overstocked
          description: |
            Statut agrégé calculé à partir des items (priorité : out-of-stock > critical > low > optimal) :
            - `out-of-stock`: au moins un item avec quantity === 0
            - `critical`: au moins un item avec quantity <= minimumStock
            - `low`: au moins un item avec quantity <= minimumStock * 1.5
            - `overstocked`: tous les items avec quantity > minimumStock * 3
            - `optimal`: tous les items dans la plage normale
          example: critical

    StockItemDTO:
      type: object
      required:
        - id
        - label
        - description
        - quantity
        - minimumStock
        - stockId
      properties:
        id:
          type: integer
          description: Identifiant unique de l'item
          example: 1
        label:
          type: string
          description: Label de l'item
          example: Aquarelle Rouge Vermillon
        description:
          type: string
          description: Description de l'item
          example: Tube 12ml
        quantity:
          type: number
          description: Quantité de cet item spécifique
          example: 3
        minimumStock:
          type: number
          description: Stock minimum pour cet item
          example: 1
        stockId:
          type: integer
          description: ID du stock parent
          example: 1
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Date et heure de la dernière modification de l'item (null si jamais modifié)
          example: '2026-04-05T14:32:00.000Z'

    # DTOs de requête (Request Bodies)
    CreateStockBody:
      type: object
      required:
        - label
        - description
        - category
      properties:
        label:
          type: string
          description: Nom du stock
          example: Stock Aquarelle
          minLength: 1
        description:
          type: string
          description: Description du stock
          example: Stock de peinture aquarelle pour loisirs créatifs
          minLength: 1
        category:
          type: string
          description: Catégorie du stock
          enum:
            - alimentation
            - hygiene
            - artistique
          example: artistique

    AddItemToStockBody:
      type: object
      required:
        - label
        - quantity
        - description
        - minimumStock
      properties:
        label:
          type: string
          description: Label de l'item
          example: Aquarelle Rouge Vermillon
          minLength: 1
        quantity:
          type: number
          description: Quantité initiale
          example: 3
          minimum: 0
        description:
          type: string
          description: Description de l'item
          example: Tube 12ml
          minLength: 1
        minimumStock:
          type: number
          description: Stock minimum requis
          example: 1
          minimum: 0

    UpdateStockBody:
      type: object
      description: Tous les champs sont optionnels — seuls les champs fournis sont mis à jour
      properties:
        label:
          type: string
          description: Nouveau nom du stock
          example: Stock Aquarelle Mise à jour
          minLength: 1
        description:
          type: string
          description: Nouvelle description du stock
          example: Stock de peinture aquarelle pour loisirs créatifs
          minLength: 1
        category:
          type: string
          description: Nouvelle catégorie du stock
          enum:
            - alimentation
            - hygiene
            - artistique
          example: artistique

    UpdateItemBody:
      type: object
      description: Tous les champs sont optionnels — seuls les champs fournis sont modifiés.
      properties:
        label:
          type: string
          description: Nouveau libellé de l'item
          example: Tomates bio
        description:
          type: string
          description: Nouvelle description de l'item
          example: Tomates bio du marché
        minimumStock:
          type: integer
          description: Nouveau stock minimum
          example: 5
          minimum: 0
        quantity:
          type: integer
          description: Nouvelle quantité
          example: 20
          minimum: 0

    UpdateItemQuantityBody:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: number
          description: Nouvelle quantité
          example: 5
          minimum: 0

    ItemContributionDTO:
      type: object
      properties:
        id:
          type: integer
          example: 3
        itemId:
          type: integer
          example: 5
        stockId:
          type: integer
          example: 1
        contributedBy:
          type: integer
          description: userId de l'auteur de la contribution
          example: 42
        suggestedQuantity:
          type: integer
          minimum: 0
          example: 0
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
          example: PENDING
        reviewedBy:
          type: integer
          nullable: true
          example: 7
        reviewedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-02T10:30:00.000Z'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-02T09:00:00.000Z'

    CreateContributionBody:
      type: object
      required:
        - suggestedQuantity
      properties:
        suggestedQuantity:
          type: integer
          minimum: 0
          description: Quantité proposée par le VIEWER_CONTRIBUTOR
          example: 0

    ReviewContributionBody:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - approve
            - reject
          description: Action de l'OWNER — approve applique la quantité, reject l'ignore
          example: approve

    # Réponses d'erreur
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Message d'erreur
          example: Resource not found
        details:
          type: string
          description: Détails supplémentaires sur l'erreur
          example: Stock with ID 999 does not exist

  responses:
    UnauthorizedError:
      description: Non authentifié - token manquant ou invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized
            details: JWT token is missing or invalid

    NotFoundError:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not Found
            details: Stock with ID 999 does not exist

    ForbiddenError:
      description: Accès refusé - droits insuffisants sur ce stock
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Forbidden
            details: You do not have write access to this stock

    BadRequestError:
      description: Requête invalide - données manquantes ou incorrectes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Bad Request
            details: Field 'label' is required

    InternalServerError:
      description: Erreur serveur interne
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Internal Server Error
            details: An unexpected error occurred
