version: "3.8"

services:
  mysql-test:
    image: mysql:8
    container_name: stockhub-mysql-test
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stockhub_test
    ports:
      - "3308:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql

volumes:
  mysql_test_data:
